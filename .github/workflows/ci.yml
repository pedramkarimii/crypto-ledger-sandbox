name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Backend quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create CI environment file
        run: cp .env.example .env

      - name: Build and start services
        run: docker compose up --build -d

      - name: Apply database migrations
        run: docker compose exec -T api alembic upgrade head

      - name: Run linter
        run: docker compose exec -T api ruff check app tests

      - name: Run tests
        run: docker compose exec -T api python -m pytest -q

      - name: Verify API readiness
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:8001/health/ready; then
              exit 0
            fi
            sleep 2
          done
          echo "API readiness check failed."
          exit 1

      - name: Show service logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Clean up
        if: always()
        run: docker compose down -v --remove-orphans
